<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Reporting O'TACOS</title>
<style>
:root{--orange:#ff7900;--orange2:#ff9f1c;--blue:#102a56;--bg:#f4f7fb;--card:#ffffff;--text:#152033;--muted:#657083;--line:#dfe6f0;--shadow:0 22px 55px rgba(16,42,86,.12)}
*{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Arial,sans-serif;background:radial-gradient(circle at top left,rgba(255,121,0,.18),transparent 32%),linear-gradient(180deg,#eef4ff 0%,#fff8f1 45%,#f8fafc 100%);color:var(--text);font-size:16px}.app{max-width:760px;margin:0 auto;padding:18px 14px 110px}.hero{background:linear-gradient(135deg,var(--blue),#071528);border-radius:26px;padding:20px;color:#fff;box-shadow:var(--shadow);margin-bottom:14px;position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-60px;top:-60px;width:180px;height:180px;border-radius:50%;background:rgba(255,121,0,.2)}.brand{display:flex;gap:12px;align-items:center;position:relative;z-index:1}.logo{width:62px;height:62px;object-fit:contain;background:#000;border-radius:16px;padding:4px;border:1px solid rgba(255,255,255,.2)}h1{margin:0;font-size:24px;line-height:1.1}.sub{color:#cbd5e1;margin-top:5px;font-size:14px}.progress-wrap{margin-top:18px;background:rgba(255,255,255,.12);border-radius:999px;height:10px;overflow:hidden;position:relative;z-index:1}.progress{height:100%;width:0;background:linear-gradient(90deg,var(--orange),var(--orange2));transition:.25s}.progress-text{margin-top:8px;color:#e5e7eb;font-size:13px;font-weight:800;position:relative;z-index:1}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-bottom:12px}.question{display:none;animation:show .22s ease both}.question.active,.question.done{display:block}@keyframes show{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}.q-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:12px}.q-num{background:#eef4ff;color:var(--blue);font-weight:900;border-radius:999px;padding:6px 10px;font-size:13px;white-space:nowrap}.q-title{font-size:20px;font-weight:950;margin:0;color:var(--blue)}.q-help{font-size:13px;color:var(--muted);margin-top:4px}input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:16px;padding:15px 16px;font:inherit;background:#fff;color:var(--text);outline:none}input:focus,select:focus,textarea:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(255,121,0,.13)}input[type=number]{font-size:24px;font-weight:900;color:var(--blue)}textarea{min-height:120px;resize:vertical}.segment{display:grid;grid-template-columns:1fr 1fr;gap:10px}.choice{cursor:pointer}.choice input{display:none}.choice span{display:flex;align-items:center;justify-content:center;text-align:center;min-height:54px;border:1.5px solid var(--line);border-radius:16px;background:#fff;font-weight:900;color:var(--blue);padding:10px}.choice input:checked+span{border-color:var(--orange);background:#fff2e6;color:#9a4a00;box-shadow:0 8px 22px rgba(255,121,0,.14)}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.inline-note{display:none;margin-top:10px;padding:12px;border-radius:15px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-weight:800;font-size:14px}.inline-note.show{display:block}.summary{display:none;background:#071528;color:#fff;border-radius:26px;padding:20px;box-shadow:var(--shadow)}.summary.show{display:block;animation:show .25s ease both}.summary h2{margin:0 0 12px;font-size:22px;color:#fff}.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.sum-item{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px}.sum-item span{display:block;color:#cbd5e1;font-size:12px}.sum-item strong{display:block;margin-top:4px;font-size:20px;color:#fff}.sum-line{border-top:1px solid rgba(255,255,255,.14);padding-top:10px;margin-top:10px;color:#e5e7eb;line-height:1.7}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom))}.bottom-inner{max-width:760px;margin:auto;display:flex;gap:10px}.btn{border:0;border-radius:16px;padding:14px 16px;font-weight:950;cursor:pointer;font-size:15px}.btn-light{background:#eef2f7;color:var(--blue);flex:1}.btn-primary{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;flex:2;display:none}.btn-primary.show{display:block}.mini{color:var(--muted);font-size:13px;margin-top:8px}.skip-wrap{margin-top:12px}.btn-skip{width:100%;border:1.5px dashed #cbd5e1;background:#f8fafc;color:var(--muted);border-radius:16px;padding:13px 14px;font-weight:950;cursor:pointer;font-size:15px}.btn-skip:hover{background:#eef2f7;color:var(--blue);border-color:var(--blue)}.skip-badge{display:inline-block;background:#eef2f7;color:var(--muted);font-weight:900;border-radius:999px;padding:5px 9px;font-size:12px;margin-left:6px}.hidden{display:none!important}@media(max-width:560px){.app{padding-left:10px;padding-right:10px}h1{font-size:21px}.sum-grid,.row2{grid-template-columns:1fr}.segment{grid-template-columns:1fr 1fr}}
</style>
</head>

const steps=[
{id:"dateReporting",type:"date",title:"Date du reporting",help:"ATTENTION ! Choisis la date du service ET pas la date du remplissage !"},{id:"responsable",type:"select",title:"Responsable",help:"Qui remplit le reporting ?",options:managers},{id:"restaurant",type:"select",title:"Restaurant",help:"Choisis le restaurant concerné.",options:["O'TACOS Boulogne","O'TACOS Armentières"]},{id:"skelloStatus",type:"radio",title:"Choisir le rapport à saisir",help:" le rapport des heures à remplir à partir du J+1",options:["Saisir les heures réelles après validation","Saisir le reporting de ton service"]},{id:"heuresReellesSkello",type:"hours",title:"Heures réelles Skello",help:"Saisis le total des heures de la journée.",dependsOn:{id:"skelloStatus",value:"Saisir les heures réelles après validation"},optionalIfHidden:true},{id:"service",type:"radio",title:"Choisis ton Service",help:"",options:["Matin","Soir"]},{id:"heuresSupp",type:"hours",title:"Tu as validé des Heures supp dans ton service ?",help:""},{id:"heuresTravailTheorique",type:"hours",title:"Saisir les heures planifiées sur le planning.",help:"(données disponibles sur Skello, sans calculer).",dependsOn:{id:"service",value:"Soir"},optionalIfHidden:true},
{id:"caRestaurant",type:"money",title:"CA TTC GLOBAL DU RESTAURANT",help:"Total Ticket Z."},{id:"cmdRestaurant",type:"number",title:"Nombre de commandes Restaurant",help:"ticket Z total."},{id:"caUber",type:"money",title:"CA TTC Uber",help:"Ticket Z Uber."},{id:"cmdUber",type:"number",title:"Nombre de commandes Uber",help:"Nombre commande Uber Ticket Z."},{id:"caDeliveroo",type:"money",title:"CA Deliveroo",help:"Ticket Z Deliveroo."},{id:"cmdDeliveroo",type:"number",title:"Nombre de commandes Deliveroo",help:"Nombre commande Deliveroo Ticket Z."},{id:"caCC",type:"money",title:"CA C&C",help:"E-Transaction petit montant."},{id:"cmdCC",type:"number",title:"Nombre de commandes C&C",help:"Nombre commande E-Transaction Ticket Z."},
{id:"invFrites",type:"inventory",title:"Inventaire — Frites"},{id:"invMerguez",type:"inventory",title:"Inventaire — Merguez",skippable:true},{id:"invPoulet",type:"inventory",title:"Inventaire — Poulet mariné",skippable:true},
{id:"rushFriture",type:"select",title:"Poste — Friture",options:equipiers},{id:"rushEnvoi",type:"select",title:"poste — Envoi",options:equipiers},{id:"rushPliage",type:"select",title:"poste — Pliage",options:equipiers},{id:"rushToaster",type:"select",title:"poste — Toaster",options:equipiers},{id:"rushCaisse",type:"select",title:"poste — Caisse",options:equipiers},
{id:"venteBoisson",type:"number",title:"Remplir le  CA boissons"},{id:"venteDessert",type:"number",title:"Remplir le CA desserts"},{id:"repasEmploye",type:"radio",title:"Tu as validé des repas employés ?",options:["Oui","Non"]},{id:"nbRepas",type:"number",title:"Nombre de repas validé"},{id:"pertes",type:"money",title:"Saisi Montant des pertes (conception + pertes ingridient) après saisie sur inpulse"},{id:"descPertes",type:"textarea",title:"Si le montant des pertes dépasse 20€ merci de fournir des explications",optional:true},{id:"reduction",type:"radio",title:"As-tu appliqué des réductions pendant le service ?",options:["Oui","Non"]},{id:"montantReduction",type:"money",title:"Quel est le montant total des réductions appliquées ?",dependsOn:{id:"reduction",value:"Oui"},optionalIfHidden:true},{id:"descReduction",type:"textarea",title:"Indiquez le motif et le montant de chaque réduction appliquée.",dependsOn:{id:"reduction",value:"Oui"},optionalIfHidden:true},{id:"ecartCaisse",type:"radio",title:"As-tu un écart de caisse dans ton service ?",options:["Oui","Non"]},{id:"montantEcart",type:"money",title:"Quel est le montant de l’écart de caisse ?",dependsOn:{id:"ecartCaisse",value:"Oui"},optionalIfHidden:true},{id:"appreciation",type:"textarea",title:"Comment évaluez-vous la qualité du service aujourd’hui ?",help:"Déroulement, organisation, problème, action à suivre."}
];
const qBox=document.getElementById('questions');
function today(){return new Date().toISOString().split('T')[0]}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function render(){qBox.innerHTML=steps.map((s,i)=>`<section class="card question" id="q_${s.id}" data-step="${i}"><div class="q-head"><div><h2 class="q-title">${esc(s.title)}</h2>${s.help?`<div class="q-help">${esc(s.help)}</div>`:''}</div></div>${fieldHtml(s)}${s.id==='service'?'<div class="inline-note" id="soirNote">Saisis tout le ticket sans faire de calcul.</div>':''}</section>`).join('');document.getElementById('dateReporting').value=today();document.querySelectorAll('input,select,textarea').forEach(el=>{el.addEventListener('input',onChange);el.addEventListener('change',onChange)});reveal()}
function fieldHtml(s){if(s.type==='date')return `<input type="date" id="${s.id}">`;if(s.type==='select')return `<select id="${s.id}"><option value="">Sélectionner</option>${s.options.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('')}</select>`;if(s.type==='radio')return `<div class="segment">${s.options.map(o=>`<label class="choice"><input type="radio" name="${s.id}" value="${esc(o)}"><span>${esc(o)}</span></label>`).join('')}</div>`;if(s.type==='textarea')return `<textarea id="${s.id}" placeholder="Écrire ici..."></textarea>`;if(s.type==='money')return `<input type="number" id="${s.id}" step="0.01" min="0" inputmode="decimal" placeholder="0,00 €">`;if(s.type==='number')return `<input type="number" id="${s.id}" min="0" inputmode="numeric" placeholder="0">`;if(s.type==='hours')return `<input type="number" id="${s.id}" min="0" step="0.01" inputmode="decimal" placeholder="saisie les heures avec virgule">`;if(s.type==='inventory'){const skip=s.skippable?`<div class="skip-wrap"><button type="button" class="btn-skip" onclick="skipInventory('${s.id}')">Reporting pour ce produit non encore disponible. Cliquez sur ce bouton pour poursuivre le remplissage du reporting.</button></div>`:'';return `<input type="hidden" id="${s.id}_skip" value=""><div class="row2"><input type="number" id="${s.id}_carton" min="0" step="0.01" placeholder="Cartons"><input type="number" id="${s.id}_sachet" min="0" step="0.01" placeholder="Sachets"><input type="number" id="${s.id}_kg" min="0" step="0.01" placeholder="Sachet entamé kg"><select id="${s.id}_livraison"><option value="">Livraison reçue ?</option><option>Oui</option><option>Non</option></select><input class="hidden" type="number" id="${s.id}_colis" min="0" placeholder="Nombre de cartons reçus"></div><div class="mini">Mettre 0 dans les champs que tu n’as pas..</div>${skip}`;}return ''}
function valueOf(id){const radio=document.querySelector(`input[name="${id}"]:checked`);if(radio)return radio.value;const el=document.getElementById(id);return el?el.value:''}
function isVisibleStep(s){if(valueOf('skelloStatus')==='Saisir les heures réelles après validation'&&!['dateReporting','responsable','skelloStatus','heuresReellesSkello'].includes(s.id))return false;if(!s.dependsOn)return true;return valueOf(s.dependsOn.id)===s.dependsOn.value}
function isFilled(s){if(!isVisibleStep(s))return !!s.optionalIfHidden;if(s.optional)return true;if(s.type==='radio')return !!document.querySelector(`input[name="${s.id}"]:checked`);if(s.type==='inventory'){if(document.getElementById(`${s.id}_skip`)?.value==='NON_CONCERNE')return true;const liv=valueOf(`${s.id}_livraison`);const colis=document.getElementById(`${s.id}_colis`).value;return document.getElementById(`${s.id}_carton`).value!==''&&document.getElementById(`${s.id}_sachet`).value!==''&&document.getElementById(`${s.id}_kg`).value!==''&&liv!==''&&(liv!=='Oui'||colis!=='')}const el=document.getElementById(s.id);return el&&el.value!==''}
function skipInventory(id){const el=document.getElementById(id+'_skip');if(el)el.value='NON_CONCERNE';['carton','sachet','kg','livraison','colis'].forEach(k=>{const f=document.getElementById(id+'_'+k);if(f)f.value=''});const colis=document.getElementById(id+'_colis');if(colis)colis.classList.add('hidden');reveal()}
function onChange(e){if(e?.target?.id?.endsWith('_livraison')){const base=e.target.id.replace('_livraison','');document.getElementById(base+'_colis').classList.toggle('hidden',e.target.value!=='Oui');if(e.target.value!=='Oui')document.getElementById(base+'_colis').value=''}document.getElementById('soirNote')?.classList.toggle('show',valueOf('service')==='Soir');reveal()}
function reveal(){let unlocked=true,filledCount=0,visibleCount=0;steps.forEach(s=>{const q=document.getElementById('q_'+s.id);const visible=isVisibleStep(s);q.classList.toggle('hidden',!visible);if(!visible)return;visibleCount++;q.classList.toggle('active',unlocked&&!isFilled(s));q.classList.toggle('done',unlocked&&isFilled(s));if(unlocked&&isFilled(s))filledCount++;else if(unlocked)unlocked=false;if(!unlocked&&!q.classList.contains('active')&&!q.classList.contains('done'))q.style.display='none';else q.style.display=''});const pct=visibleCount?Math.round(filledCount/visibleCount*100):0;document.getElementById('progress').style.width=pct+'%';document.getElementById('progressText').textContent=pct+'% complété';if(filledCount===visibleCount)showSummary();else{document.getElementById('summary').classList.remove('show');document.getElementById('sendBtn').classList.remove('show')}}
function num(id){return parseFloat(document.getElementById(id)?.value)||0}
function inventorySummary(id){if(document.getElementById(id+'_skip')?.value==='NON_CONCERNE')return '<span class="skip-badge">Non concerné</span>';return `${esc(valueOf(id+'_carton'))} cartons / ${esc(valueOf(id+'_sachet'))} sachets / ${esc(valueOf(id+'_kg'))} kg`; }
function showSummary(){const skelloDispo=valueOf('skelloStatus')==='Saisir les heures réelles après validation';const ca=num('caRestaurant')+num('caUber')+num('caDeliveroo')+num('caCC');const cmd=num('cmdRestaurant')+num('cmdUber')+num('cmdDeliveroo')+num('cmdCC');const tm=cmd?ca/cmd:0;const pertes=num('pertes');if(skelloDispo){document.getElementById('sumGrid').innerHTML=`<div class="sum-item"><span>Responsable</span><strong>${esc(valueOf('responsable'))}</strong></div><div class="sum-item"><span>Choix</span><strong>Heures réelles</strong></div><div class="sum-item"><span>Heures réelles Skello</span><strong>${num('heuresReellesSkello')}</strong></div>`;document.getElementById('sumDetails').innerHTML=`<b>Responsable :</b> ${esc(valueOf('responsable'))}<br><b>Date du reporting :</b> ${esc(valueOf('dateReporting'))}<br><b>Heures réelles Skello :</b> ${num('heuresReellesSkello')}<br><br>Tu peux envoyer directement.`;}else{document.getElementById('sumGrid').innerHTML=`<div class="sum-item"><span>Restaurant</span><strong>${esc(valueOf('restaurant'))}</strong></div><div class="sum-item"><span>Service</span><strong>${esc(valueOf('service'))}</strong></div><div class="sum-item"><span>Heures supp</span><strong>${num('heuresSupp')}</strong></div>${valueOf('service')==='Soir'?`<div class="sum-item"><span>Heures théoriques</span><strong>${num('heuresTravailTheorique')}</strong></div>`:''}<div class="sum-item"><span>CA total</span><strong>${ca.toFixed(2)} €</strong></div><div class="sum-item"><span>Commandes</span><strong>${cmd}</strong></div><div class="sum-item"><span>Ticket moyen</span><strong>${tm.toFixed(2)} €</strong></div><div class="sum-item"><span>Pertes</span><strong>${pertes.toFixed(2)} €</strong></div>`;document.getElementById('sumDetails').innerHTML=`<b>Responsable :</b> ${esc(valueOf('responsable'))}<br><b>Date du reporting :</b> ${esc(valueOf('dateReporting'))}<br><b>Skello :</b> ${esc(valueOf('skelloStatus'))}<br><b>Heures supp :</b> ${num('heuresSupp')}<br>${valueOf('service')==='Soir'?`<b>Heures de travail théorique :</b> ${num('heuresTravailTheorique')}<br>`:''}<br><b>CA :</b> Restaurant ${num('caRestaurant').toFixed(2)} € — Uber ${num('caUber').toFixed(2)} € — Deliveroo ${num('caDeliveroo').toFixed(2)} € — C&C ${num('caCC').toFixed(2)} €<br><b>Inventaire :</b> Frites ${inventorySummary('invFrites')} — Merguez ${inventorySummary('invMerguez')} — Poulet mariné ${inventorySummary('invPoulet')}<br><b>Rush :</b> Friture ${esc(valueOf('rushFriture'))}, Envoi ${esc(valueOf('rushEnvoi'))}, Pliage ${esc(valueOf('rushPliage'))}, Toaster ${esc(valueOf('rushToaster'))}, Caisse ${esc(valueOf('rushCaisse'))}<br><b>Boissons / Desserts :</b> ${num('venteBoisson')} / ${num('venteDessert')}<br><b>Repas :</b> ${esc(valueOf('repasEmploye'))} — ${num('nbRepas')} repas<br><b>Réduction :</b> ${esc(valueOf('reduction'))} — ${num('montantReduction').toFixed(2)} €<br><b>Écart caisse :</b> ${esc(valueOf('ecartCaisse'))} — ${num('montantEcart').toFixed(2)} €<br><br><b>Appréciation :</b><br>${esc(valueOf('appreciation'))}`;}document.getElementById('summary').classList.add('show');document.getElementById('sendBtn').classList.add('show');document.getElementById('summary').scrollIntoView({behavior:'smooth',block:'start'})}
function collectReport(){const data={};steps.forEach(s=>{if(!isVisibleStep(s))return;if(s.type==='inventory')data[s.id]=document.getElementById(s.id+'_skip')?.value==='NON_CONCERNE'?{status:'NON_CONCERNE'}:{carton:valueOf(s.id+'_carton'),sachet:valueOf(s.id+'_sachet'),kg:valueOf(s.id+'_kg'),livraison:valueOf(s.id+'_livraison'),colis:valueOf(s.id+'_colis')};else data[s.id]=valueOf(s.id)});return data}
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwnqNGPL0rPU1NQu9iydpIXurQVzEZTP19yU--pF3AfktajWWH7Ufkne02J3eQ3LaPl1A/exec';
function mapToAppsScriptPayload(d){
  const inv=(key)=>d[key]||{};
  const status=(key)=>inv(key).status==='NON_CONCERNE'?'NON_CONCERNE':'CONCERNE';
  return {
    dateReporting:d.dateReporting||'',
    restaurant:d.restaurant||'',
    skelloStatus:d.skelloStatus||'',
    heuresReellesSkello:Number(d.heuresReellesSkello||0),
    heuresSupp:Number(d.heuresSupp||0),
    heuresTravailTheorique:Number(d.heuresTravailTheorique||0),
    responsable:d.responsable||'',
    service:d.service||'',
    caRestaurant:Number(d.caRestaurant||0),
    cmdRestaurant:Number(d.cmdRestaurant||0),
    caUber:Number(d.caUber||0),
    cmdUber:Number(d.cmdUber||0),
    caDeliveroo:Number(d.caDeliveroo||0),
    cmdDeliveroo:Number(d.cmdDeliveroo||0),
    caCC:Number(d.caCC||0),
    cmdCC:Number(d.cmdCC||0),
    fritesCarton:Number(inv('invFrites').carton||0),
    fritesSachet:Number(inv('invFrites').sachet||0),
    fritesKg:Number(inv('invFrites').kg||0),
    fritesLivraison:inv('invFrites').livraison||'',
    fritesColis:Number(inv('invFrites').colis||0),
    merguezCheck:status('invMerguez'),
    merguezCarton:Number(inv('invMerguez').carton||0),
    merguezSachet:Number(inv('invMerguez').sachet||0),
    merguezKg:Number(inv('invMerguez').kg||0),
    merguezLivraison:inv('invMerguez').livraison||'',
    merguezColis:Number(inv('invMerguez').colis||0),
    pouletCheck:status('invPoulet'),
    pouletCarton:Number(inv('invPoulet').carton||0),
    pouletSachet:Number(inv('invPoulet').sachet||0),
    pouletKg:Number(inv('invPoulet').kg||0),
    pouletLivraison:inv('invPoulet').livraison||'',
    pouletColis:Number(inv('invPoulet').colis||0),
    rushFriture:d.rushFriture||'',
    rushEnvoie:d.rushEnvoi||'',
    rushPliage:d.rushPliage||'',
    rushToaster:d.rushToaster||'',
    rushCaisse:d.rushCaisse||'',
    venteBoisson:Number(d.venteBoisson||0),
    venteDessert:Number(d.venteDessert||0),
    nbRepas:Number(d.nbRepas||0),
    pertes:Number(d.pertes||0),
    reduction:d.reduction||'',
    montantReduction:Number(d.montantReduction||0),
    descReduction:d.descReduction||'',
    ecartCaisse:Number(d.montantEcart||0),
    appreciation:d.appreciation||''
  };
}
async function sendReport(){
  const raw=collectReport();
  const data=mapToAppsScriptPayload(raw);
  const btn=document.getElementById('sendBtn');
  const oldText=btn.textContent;
  btn.disabled=true;
  btn.textContent='Envoi en cours…';
  try{
    const res=await fetch(APPS_SCRIPT_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(data)
    });
    const txt=await res.text();
    let result={};
    try{result=JSON.parse(txt)}catch(e){}
    if(result.success===false) throw new Error(result.message||result.error||'Erreur Apps Script');
    alert('✅ Reporting enregistré dans Google Sheets et envoyé sur Telegram.');
  }catch(err){
    console.error(err);
    alert('❌ Erreur d’envoi : '+(err.message||err));
  }finally{
    btn.disabled=false;
    btn.textContent=oldText;
  }
}
function resetAll(){if(!confirm('Effacer toute la saisie ?'))return;document.querySelectorAll('input,select,textarea').forEach(el=>{if(el.type==='radio')el.checked=false;else el.value=''});document.getElementById('dateReporting').value=today();document.getElementById('summary').classList.remove('show');document.getElementById('sendBtn').classList.remove('show');reveal()}
render();
</script>
</body>
